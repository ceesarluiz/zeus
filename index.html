const { useState, useEffect, useRef } = React;

function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1).replace('.',',') + 'M';
  if (n >= 1000) return (n/1000).toFixed(1).replace('.',',') + 'K';
  return n.toLocaleString('pt-BR');
}
function fmtR(n) {
  return 'R$ ' + n.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

// Animated counter
function Counter({ target, format = 'num', duration = 1200 }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start = null;
    const step = (ts) => {
      if (!start) start = ts;
      const prog = Math.min((ts - start) / duration, 1);
      const ease = 1 - Math.pow(1 - prog, 3);
      setVal(Math.round(ease * target));
      if (prog < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [target]);
  if (format === 'currency') return <>{fmtR(val * (target > 0 ? 1 : 0) || 0)}</>;
  if (format === 'decimal') return <>{('R$ ' + (val / 100).toFixed(2)).replace('.',',')}</>;
  return <>{fmt(val)}</>;
}

function KPICard({ icon, label, value, format, color, change, delay }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setVisible(true), delay);
    return () => clearTimeout(t);
  }, []);
  return (
    <div style={{
      background: 'linear-gradient(135deg, #111520 0%, #161c2e 100%)',
      border: '1px solid #1e2540',
      borderRadius: 16,
      padding: '24px 26px',
      display: 'flex',
      flexDirection: 'column',
      gap: 14,
      opacity: visible ? 1 : 0,
      transform: visible ? 'translateY(0)' : 'translateY(20px)',
      transition: 'opacity 0.5s ease, transform 0.5s ease',
      position: 'relative',
      overflow: 'hidden',
    }}>
      {/* glow */}
      <div style={{
        position: 'absolute', top: 0, right: 0,
        width: 120, height: 120,
        background: color,
        opacity: 0.06,
        borderRadius: '50%',
        transform: 'translate(30%, -30%)',
        pointerEvents: 'none',
      }} />
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{
          width: 42, height: 42, borderRadius: 12,
          background: color + '18',
          display: 'flex', alignItems: 'center', justifyContent: 'center',

          {ICONS[icon] && ICONS[icon](color)}
        </div>
        {change !== undefined && (
          <div style={{
            fontSize: 12, fontWeight: 600,
            color: change >= 0 ? '#30d98a' : '#f06060',
            background: change >= 0 ? '#30d98a18' : '#f0606018',

          }}>
            {change >= 0 ? '▲' : '▼'} {Math.abs(change)}%
          </div>
        )}
      </div>
      <div>
        <div style={{ fontSize: 13, color: '#7a86a6', fontWeight: 500, marginBottom: 4 }}>{label}</div>
        <div style={{ fontSize: 32, fontWeight: 700, color: '#f0f2f8', letterSpacing: '-1px', lineHeight: 1 }}>
          {visible
            ? (format === 'currency' ? fmtR(value)

               : fmt(value))
            : (format === 'currency' ? 'R$ 0,00' : format === 'cpm' ? 'R$ 0,00' : '0')}
        </div>

    </div>
  );
}

function LineChart({ accent }) {
  const ref = useRef();
  const chartRef = useRef();

  const labels = ['01 Mar', '05 Mar', '10 Mar', '15 Mar', '20 Mar', '25 Mar', '31 Mar'];
  const reachData = [12400, 18700, 22100, 31500, 28900, 35200, 41800];
  const leadsData = [18, 32, 44, 67, 58, 82, 97];

  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    const ctx = ref.current.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 220);
    grad.addColorStop(0, accent + '44');
    grad.addColorStop(1, accent + '00');

    chartRef.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Alcance diário',
            data: reachData,
            borderColor: accent,
            backgroundColor: grad,
            borderWidth: 2.5,
            pointRadius: 4,
            pointBackgroundColor: accent,
            tension: 0.4,
            fill: true,
            yAxisID: 'y',
          },
          {

            borderColor: '#30d98a',
            backgroundColor: 'transparent',
            borderWidth: 2,
            pointRadius: 4,
            pointBackgroundColor: '#30d98a',
            tension: 0.4,
            fill: false,
            yAxisID: 'y2',
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#7a86a6', font: { family: 'DM Sans', size: 12 } } },
          tooltip: {
            backgroundColor: '#1a2035',
            borderColor: '#2a3050',
            borderWidth: 1,
            titleColor: '#f0f2f8',
            bodyColor: '#a0aabf',
          }
        },
        scales: {
          x: { ticks: { color: '#5a6480', font: { family: 'DM Sans' } }, grid: { color: '#1a2035' } },
          y: {
            position: 'left',
            ticks: { color: '#5a6480', font: { family: 'DM Sans' }, callback: v => fmt(v) },
            grid: { color: '#1a2035' },
          },
          y2: {
            position: 'right',
            ticks: { color: '#30d98a', font: { family: 'DM Sans' } },
            grid: { drawOnChartArea: false },
          }
        }
      }
    });
    return () => chartRef.current?.destroy();
  }, [accent]);

  return <canvas ref={ref} />;
}

  const labels = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'];

  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    const ctx = ref.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Novos seguidores',
          data,
          backgroundColor: accent + 'cc',
          borderRadius: 8,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a2035',
            borderColor: '#2a3050',
            borderWidth: 1,

          y: { ticks: { color: '#5a6480', font: { family: 'DM Sans' } }, grid: { color: '#1a2035' } }

    });
    return () => chartRef.current?.destroy();
  }, [accent]);

  return <canvas ref={ref} />;
}

  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ fontSize: 11, color: '#5a6480', marginBottom: 4 }}>{label}</div>
      {children}
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('fb_ads_tweaks') || 'null');
      return { ...TWEAK_DEFAULTS, ...saved };
    } catch { return TWEAK_DEFAULTS; }
  });
  const [tweaksVisible, setTweaksVisible] = useState(false);

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

    setTweaks(prev => {
      const next = { ...prev, [key]: val };
      localStorage.setItem('fb_ads_tweaks', JSON.stringify(next));
